name: Pull request dashboard repo

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      pr_number:
        required: false
        default: ""
        type: string
      required_approvals:
        required: false
        default: 1
        type: number
      approver_teams_json:
        required: false
        default: "[]"
        type: string
      slack_channel:
        required: false
        default: ""
        type: string
      slack_user_mapping_json:
        required: false
        default: "{}"
        type: string
      large_repo:
        required: false
        default: false
        type: boolean
      stale_waiting_on_author:
        required: false
        default: false
        type: boolean
    secrets:
      PR_DASHBOARD_PRIVATE_KEY:
        required: true
      COPILOT_GITHUB_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

permissions:
  contents: read

env:
  DASHBOARD_STATE_BRANCH_PREFIX: otelbot/pull-request-dashboard-state

jobs:
  update-dashboard:
    concurrency:
      group: ${{ github.workflow }}-state-${{ inputs.repository }}-${{ inputs.pr_number || 'backfill' }}
      cancel-in-progress: false
    permissions:
      contents: write
    environment: protected
    runs-on: ubuntu-latest
    outputs:
      initial_backfill_complete: ${{ steps.dashboard-update.outputs.initial_backfill_complete }}
      refreshed_pr_numbers: ${{ steps.dashboard-update.outputs.refreshed_pr_numbers }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: dashboard-token
        with:
          client-id: ${{ vars.PR_DASHBOARD_CLIENT_ID }}
          private-key: ${{ secrets.PR_DASHBOARD_PRIVATE_KEY }}
          owner: open-telemetry
          repositories: ${{ inputs.repository }}
          permission-checks: read
          permission-contents: read
          permission-issues: read
          permission-members: read
          permission-pull-requests: read

      - name: Restore per-PR classification cache
        if: inputs.pr_number != ''
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .github/scripts/pull-request-dashboard/.cache/classifications
          key: pull-request-dashboard-classifications-${{ inputs.repository }}-${{ inputs.pr_number }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            pull-request-dashboard-classifications-${{ inputs.repository }}-${{ inputs.pr_number }}-
            pull-request-dashboard-classifications-${{ inputs.repository }}-all-

      - name: Restore shared backfill classification cache
        if: inputs.pr_number == ''
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .github/scripts/pull-request-dashboard/.cache/classifications
          key: pull-request-dashboard-classifications-${{ inputs.repository }}-all-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            pull-request-dashboard-classifications-${{ inputs.repository }}-all-

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Copilot CLI
        run: |
          npm ci --prefix .github/scripts/pull-request-dashboard
          echo "$GITHUB_WORKSPACE/.github/scripts/pull-request-dashboard/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Generate and update dashboard state
        id: dashboard-update
        env:
          TRIGGER_PR_NUMBER: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ steps.dashboard-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DASHBOARD_TOKEN: ${{ steps.dashboard-token.outputs.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repository }}
          REQUIRED_APPROVALS: ${{ inputs.required_approvals }}
          APPROVER_TEAMS_JSON: ${{ inputs.approver_teams_json }}
        run: |
          set -euo pipefail
          state_branch="${DASHBOARD_STATE_BRANCH_PREFIX}/${REPO_NAME}"
          dashboard_args=(--state-branch "$state_branch" --repo "$REPO_NAME" --github-output "$GITHUB_OUTPUT")
          dashboard_args+=(--required-approvals "$REQUIRED_APPROVALS")
          for team in $(jq -r '.[]' <<< "$APPROVER_TEAMS_JSON"); do
            dashboard_args+=(--approver-team "$team")
          done
          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            dashboard_args+=(--pr-number "$TRIGGER_PR_NUMBER")
          fi
          python3 .github/scripts/pull-request-dashboard/dashboard.py "${dashboard_args[@]}"

      - name: Save per-PR classification cache
        # Preserve valid classifications even when another item fails the update.
        if: always() && inputs.pr_number != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .github/scripts/pull-request-dashboard/.cache/classifications
          key: pull-request-dashboard-classifications-${{ inputs.repository }}-${{ inputs.pr_number }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save shared backfill classification cache
        # Preserve valid classifications even when another item fails the update.
        if: always() && inputs.pr_number == ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .github/scripts/pull-request-dashboard/.cache/classifications
          key: pull-request-dashboard-classifications-${{ inputs.repository }}-all-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Report GitHub App rate limits
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.dashboard-token.outputs.token }}
        run: python3 .github/scripts/pull-request-dashboard/report_rate_limits.py

  update-pr-status-comment:
    needs: update-dashboard
    if: >-
      always() &&
      (needs.update-dashboard.result == 'success' || inputs.pr_number == '') &&
      needs.update-dashboard.outputs.initial_backfill_complete == 'true'
    concurrency:
      group: ${{ github.workflow }}-status-${{ inputs.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: dashboard-token
        with:
          client-id: ${{ vars.PR_DASHBOARD_CLIENT_ID }}
          private-key: ${{ secrets.PR_DASHBOARD_PRIVATE_KEY }}
          owner: open-telemetry
          repositories: ${{ inputs.repository }}
          permission-issues: write
          permission-pull-requests: read

      - name: Update PR status comment
        env:
          GH_TOKEN: ${{ steps.dashboard-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO_NAME: ${{ inputs.repository }}
        run: |
          set -euo pipefail
          state_branch="${DASHBOARD_STATE_BRANCH_PREFIX}/${REPO_NAME}"
          status_args=(--state-branch "$state_branch" --repo "$REPO_NAME")
          if [[ -n "${PR_NUMBER:-}" ]]; then
            status_args+=(--pr-number "$PR_NUMBER")
          fi
          python3 .github/scripts/pull-request-dashboard/pr_status_comment.py "${status_args[@]}"

  notify-slack:
    needs: update-dashboard
    if: >-
      always() &&
      (needs.update-dashboard.result == 'success' || inputs.pr_number == '') &&
      needs.update-dashboard.outputs.initial_backfill_complete == 'true' &&
      (github.event_name == 'schedule' || inputs.pr_number != '')
    concurrency:
      group: ${{ github.workflow }}-notify-${{ inputs.repository }}-${{ inputs.pr_number || 'backfill' }}
      cancel-in-progress: false
    permissions:
      contents: write
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: dashboard-token
        with:
          client-id: ${{ vars.PR_DASHBOARD_CLIENT_ID }}
          private-key: ${{ secrets.PR_DASHBOARD_PRIVATE_KEY }}
          owner: open-telemetry
          repositories: ${{ inputs.repository }}
          permission-pull-requests: read

      - name: Send Slack notifications
        env:
          GH_TOKEN: ${{ steps.dashboard-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
          SLACK_USER_MAP_JSON: ${{ inputs.slack_user_mapping_json }}
          REPO_NAME: ${{ inputs.repository }}
          REFRESHED_PR_NUMBERS: ${{ needs.update-dashboard.outputs.refreshed_pr_numbers }}
          TRIGGER_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          state_branch="${DASHBOARD_STATE_BRANCH_PREFIX}/${REPO_NAME}"
          notify_args=(--state-branch "$state_branch" --repo "$REPO_NAME")
          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            notify_args+=(--pr-number "$TRIGGER_PR_NUMBER")
          else
            notify_args+=(--pr-numbers "$REFRESHED_PR_NUMBERS")
          fi

          python3 .github/scripts/pull-request-dashboard/notify_slack.py "${notify_args[@]}"

  author-follow-up:
    needs: update-dashboard
    if: >-
      always() &&
      (needs.update-dashboard.result == 'success' || inputs.pr_number == '') &&
      needs.update-dashboard.outputs.initial_backfill_complete == 'true'
    concurrency:
      group: ${{ github.workflow }}-author-follow-up-${{ inputs.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: dashboard-token
        with:
          client-id: ${{ vars.PR_DASHBOARD_CLIENT_ID }}
          private-key: ${{ secrets.PR_DASHBOARD_PRIVATE_KEY }}
          owner: open-telemetry
          repositories: ${{ inputs.repository }}
          permission-issues: write
          permission-pull-requests: ${{ inputs.pr_number == '' && inputs.stale_waiting_on_author && 'write' || 'read' }}

      - name: Process author follow-ups
        env:
          GH_TOKEN: ${{ steps.dashboard-token.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ inputs.repository }}
          REFRESHED_PR_NUMBERS: ${{ needs.update-dashboard.outputs.refreshed_pr_numbers }}
          STALE_WAITING_ON_AUTHOR: ${{ inputs.stale_waiting_on_author }}
          TRIGGER_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          state_branch="${DASHBOARD_STATE_BRANCH_PREFIX}/${REPO_NAME}"
          follow_up_pr_numbers="$REFRESHED_PR_NUMBERS"
          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            follow_up_pr_numbers="$TRIGGER_PR_NUMBER"
          fi
          follow_up_args=(
            --state-branch "$state_branch"
            --repo "$REPO_NAME"
            --pr-numbers "$follow_up_pr_numbers"
          )
          if [[ "$STALE_WAITING_ON_AUTHOR" == "true" ]]; then
            follow_up_args+=(--stale)
          fi
          if [[ -n "${TRIGGER_PR_NUMBER:-}" ]]; then
            follow_up_args+=(--reset-only)
          fi
          python3 .github/scripts/pull-request-dashboard/process_author_follow_ups.py "${follow_up_args[@]}"

  publish-dashboard:
    needs: update-dashboard
    if: >-
      always() &&
      (needs.update-dashboard.result == 'success' || inputs.pr_number == '') &&
      needs.update-dashboard.outputs.initial_backfill_complete == 'true'
    concurrency:
      group: ${{ github.workflow }}-publish-${{ inputs.repository }}
      cancel-in-progress: true
    permissions:
      contents: read
    environment: protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: dashboard-token
        with:
          client-id: ${{ vars.PR_DASHBOARD_CLIENT_ID }}
          private-key: ${{ secrets.PR_DASHBOARD_PRIVATE_KEY }}
          owner: open-telemetry
          repositories: ${{ inputs.repository }}
          permission-issues: write
          permission-pull-requests: read

      - name: Publish dashboard issue
        env:
          GH_TOKEN: ${{ steps.dashboard-token.outputs.token }}
          REPO_NAME: ${{ inputs.repository }}
          LARGE_REPO: ${{ inputs.large_repo }}
        run: |
          set -euo pipefail
          state_branch="${DASHBOARD_STATE_BRANCH_PREFIX}/${REPO_NAME}"
          publish_args=(
            --state-branch "$state_branch"
            --repo "$REPO_NAME"
          )
          if [[ "${LARGE_REPO:-false}" == "true" ]]; then
            publish_args+=(--large-repo)
          fi
          python3 .github/scripts/pull-request-dashboard/publish_dashboard.py "${publish_args[@]}"
