# Reusable workflow — see /workflow-failure-issue/README.md for consumer documentation.
name: Workflow failure issue

on:
  workflow_call:
    inputs:
      success:
        type: boolean
        required: true

permissions:
  contents: read

jobs:
  workflow-failure-issue:
    name: Open or close workflow failure issue
    permissions:
      issues: write # needed to open, comment on, and close workflow failure issues
    runs-on: ubuntu-latest
    steps:
      - name: Open issue or add comment if issue already open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          INPUT_SUCCESS: ${{ inputs.success }}
        run: |
          set -euo pipefail

          # TODO (trask) search doesn't support exact phrases, so it's possible that this could grab the wrong issue
          number=$(gh issue list --search "in:title Workflow failed: $GITHUB_WORKFLOW" --limit 1 --json number -q .[].number)

          echo "$number"
          echo "$INPUT_SUCCESS"

          if [[ -n "$number" ]]; then
            if [[ "$INPUT_SUCCESS" == "true" ]]; then
              gh issue close "$number"
            else
              gh issue comment "$number" \
                               --body "See [$GITHUB_WORKFLOW #$GITHUB_RUN_NUMBER](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."
            fi
          elif [[ "$INPUT_SUCCESS" == "false" ]]; then
            gh issue create --title "Workflow failed: $GITHUB_WORKFLOW (#$GITHUB_RUN_NUMBER)" \
                            --body "See [$GITHUB_WORKFLOW #$GITHUB_RUN_NUMBER](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."
          fi
