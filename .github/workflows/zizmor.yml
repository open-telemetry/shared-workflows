# Reusable workflow — see /zizmor/README.md for consumer documentation.
name: Zizmor GitHub Actions Security Analysis

on:
  workflow_call:
    inputs:
      persona:
        description: 'Zizmor persona to use for analysis.'
        required: false
        default: regular
        type: string
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '45 9 * * 5' # weekly at 09:45 (UTC) on Friday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: Zizmor Security Analysis
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      security-events: write  # for zizmor to upload SARIF results
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          persona: ${{ inputs.persona || 'regular' }}
