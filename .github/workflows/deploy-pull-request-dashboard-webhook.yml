name: Deploy pull request dashboard webhook

on:
  push:
    branches:
      - main
    paths:
      - .github/scripts/pull-request-dashboard/netlify.toml
      - .github/scripts/pull-request-dashboard/netlify/**
      - .github/scripts/pull-request-dashboard/public/**
      - .github/workflows/deploy-pull-request-dashboard-webhook.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pull-request-dashboard-webhook
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'open-telemetry/shared-workflows'
    runs-on: ubuntu-latest
    environment: protected
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Configure Netlify dispatcher environment
        working-directory: .github/scripts/pull-request-dashboard
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_PR_DASHBOARD_PROJECT_ID }}
          OTELBOT_SHARED_WORKFLOWS_APP_ID: ${{ vars.OTELBOT_SHARED_WORKFLOWS_APP_ID }}
          OTELBOT_SHARED_WORKFLOWS_PRIVATE_KEY: ${{ secrets.OTELBOT_SHARED_WORKFLOWS_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          dispatcher_private_key_base64=$(printf '%s' "$OTELBOT_SHARED_WORKFLOWS_PRIVATE_KEY" | base64 -w0)
          echo "::add-mask::$dispatcher_private_key_base64"
          npx --yes netlify-cli@26.0.2 env:set OTELBOT_SHARED_WORKFLOWS_APP_ID "$OTELBOT_SHARED_WORKFLOWS_APP_ID" \
            --context production \
            --scope functions \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --force
          npx --yes netlify-cli@26.0.2 env:set OTELBOT_SHARED_WORKFLOWS_PRIVATE_KEY_BASE64 "$dispatcher_private_key_base64" \
            --context production \
            --scope functions \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --secret \
            --force

      - name: Deploy Netlify function
        working-directory: .github/scripts/pull-request-dashboard
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_PR_DASHBOARD_PROJECT_ID }}
        run: |
          set -euo pipefail
          npx --yes netlify-cli@26.0.2 deploy \
            --prod \
            --dir public \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --message "${GITHUB_REPOSITORY}@${GITHUB_SHA}"